spring:
  application:
    name: gunpla-list

  datasource:
    url: jdbc:sqlite:${app.db-path}
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - profile

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


app:
  db-path: ${DB_PATH:./data/gunpla-list.db}
  base-url: http://localhost:8080
  box-art:
    original-directory: ${BOX_ART_ORIGINAL_DIRECTORY:./data/boxart/original}
    thumbnail-directory: ${BOX_ART_THUMBNAIL_DIRECTORY:./data/boxart/thumbnail}
