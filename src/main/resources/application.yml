spring:
  application:
    name: gunpla-list

  datasource:
    url: jdbc:sqlite:${app.db-path}
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 이미 V1~V11이 적용된 DB에서 flyway_schema_history 테이블이 없을 때
    # V11을 베이스라인으로 표시하고 V12부터만 실행
    baseline-on-migrate: true
    baseline-version: 11
    # 마이그레이션 파일에 주석을 추가하면 체크섬이 달라지므로, 체크섬 검증을 비활성화
    validate-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - profile

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


app:
  db-path: ${DB_PATH:./data/gunpla-list.db}
  base-url: http://localhost:8080
  box-art:
    original-directory: ${BOX_ART_ORIGINAL_DIRECTORY:./data/boxart/original}
    thumbnail-directory: ${BOX_ART_THUMBNAIL_DIRECTORY:./data/boxart/thumbnail}
